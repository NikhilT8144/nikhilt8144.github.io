<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Advanced Optical Isomerism Visualizer</title>
    
    <!-- Core Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        body { margin: 0; background-color: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        
        /* Custom scrollbar optimized for the info panel */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Eliminate canvas outline and optimize rendering */
        canvas { outline: none; display: block; will-change: transform; }
    </style>
</head>
<body class="text-slate-200 bg-slate-900 overflow-x-hidden">

    <!-- Master Layout: Vertical stack on mobile, horizontal split on desktop -->
    <div class="flex flex-col md:flex-row w-full min-h-screen relative">

        <!-- 3D Visualization Canvas -->
        <div id="canvas-wrapper" class="relative w-full h-[70dvh] md:h-screen md:flex-1 min-w-0 bg-[#0B101E] cursor-move z-10">
            
            <!-- Absolute positioning isolates the canvas from DOM flow, stopping resize loops -->
            <div id="canvas-container" class="absolute inset-0 overflow-hidden"></div>
            
            <!-- Floating Canvas Branding -->
            <div class="absolute top-4 left-4 pointer-events-none z-20">
                <h1 class="text-xl md:text-2xl font-bold text-white tracking-tight flex items-center gap-2 drop-shadow-md">
                    <span class="text-blue-500">Stereo</span>Chem
                </h1>
                <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mt-1 drop-shadow-md">Multi-Symmetry Engine</p>
            </div>
            
            <!-- Rotation Toggle -->
            <button id="toggle-autorotate" class="absolute bottom-4 left-4 bg-slate-800/80 hover:bg-slate-700 text-white border border-slate-600 backdrop-blur-sm px-3 py-1.5 rounded-lg text-xs font-semibold shadow-lg transition-colors z-20">
                Pause Auto-Rotation
            </button>
        </div>

        <!-- Right / Bottom Panel: Sidebar container (Fixed height on desktop, auto on mobile) -->
        <div class="w-full md:w-[340px] lg:w-[420px] xl:w-[460px] flex flex-col z-20 bg-slate-900 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] md:shadow-[-10px_0_30px_rgba(0,0,0,0.5)] md:h-screen flex-shrink-0">
            
            <!-- CONTROL CENTER: Fixed at the top of the sidebar on desktop. Takes exactly 30dvh on mobile on load. -->
            <div class="p-4 md:p-5 border-b border-slate-800 bg-slate-900/95 min-h-[30dvh] md:min-h-0 flex flex-col justify-center flex-shrink-0 z-30">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Active Conformation</label>
                <select id="molecule-select" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-sm font-semibold text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-inner mb-3">
                    <optgroup label="Multiple Symmetry & PnC Configurations">
                        <option value="ethane_staggered">Staggered Ethane (3 POS, 1 COS, AOS, AAOS)</option>
                        <option value="meso_tartaric_anti">Meso-Tartaric Acid (Anti) - 1 COS, 2 Chiral Centers</option>
                        <option value="meso_tartaric_eclip">Meso-Tartaric Acid (Eclipsed) - 1 POS, 2 Chiral Centers</option>
                        <option value="d_tartaric">D-Tartaric Acid (Active) - C2 AOS, 2 Chiral Centers</option>
                    </optgroup>
                    <optgroup label="Classical Cases">
                        <option value="lactic_acid">D-Lactic Acid - 1 Chiral Center (Active)</option>
                        <option value="allene_even">1,3-Dichloroallene - Molecular Chirality</option>
                        <option value="allene_odd">1,4-Dichlorobutatriene - Planar POS (Inactive)</option>
                        <option value="cis_cyclopropane">cis-1,2-Dimethylcyclopropane - Meso (POS)</option>
                    </optgroup>
                </select>
                
                <!-- Dynamic Element Toggles Grid -->
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-pos" class="w-full py-2 px-2 rounded-lg bg-blue-900/30 text-blue-400 border border-blue-800 text-[10px] lg:text-[11px] font-bold transition-all flex items-center justify-center gap-1.5 opacity-40 shadow-sm">
                        <span class="w-1.5 h-1.5 rounded-full bg-blue-500 indicator hidden"></span> POS (σ)
                    </button>
                    <button id="btn-cos" class="w-full py-2 px-2 rounded-lg bg-purple-900/30 text-purple-400 border border-purple-800 text-[10px] lg:text-[11px] font-bold transition-all flex items-center justify-center gap-1.5 opacity-40 shadow-sm">
                        <span class="w-1.5 h-1.5 rounded-full bg-purple-500 indicator hidden"></span> COS (i)
                    </button>
                    <button id="btn-aos" class="w-full py-2 px-2 rounded-lg bg-emerald-900/30 text-emerald-400 border border-emerald-800 text-[10px] lg:text-[11px] font-bold transition-all flex items-center justify-center gap-1.5 opacity-40 shadow-sm">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 indicator hidden"></span> AOS (Cn)
                    </button>
                    <button id="btn-aaos" class="w-full py-2 px-2 rounded-lg bg-rose-900/30 text-rose-400 border border-rose-800 text-[10px] lg:text-[11px] font-bold transition-all flex items-center justify-center gap-1.5 opacity-40 shadow-sm">
                        <span class="w-1.5 h-1.5 rounded-full bg-rose-500 indicator hidden"></span> AAOS (Sn)
                    </button>
                    <button id="btn-chiral" class="w-full col-span-2 py-2 px-2 rounded-lg bg-amber-900/30 text-amber-400 border border-amber-800 text-[10px] lg:text-[11px] font-bold transition-all flex items-center justify-center gap-1.5 opacity-40 shadow-sm">
                        <span class="w-1.5 h-1.5 rounded-full bg-amber-500 indicator hidden"></span> Highlight Chiral Centers
                    </button>
                </div>
            </div>

            <!-- INFO PANEL: Scrollable ONLY on desktop to utilize the remaining sidebar space beautifully -->
            <div class="flex-1 p-4 md:p-5 bg-slate-900 md:overflow-y-auto custom-scrollbar flex flex-col">
                
                <!-- Telemetry Matrix -->
                <div class="grid grid-cols-2 gap-3 mb-5">
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700/50 flex flex-col items-center">
                        <span class="text-[9px] text-slate-400 uppercase tracking-widest font-bold mb-1">Optically Active</span>
                        <span id="status-activity" class="text-sm font-bold">No</span>
                    </div>
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700/50 flex flex-col items-center">
                        <span class="text-[9px] text-slate-400 uppercase tracking-widest font-bold mb-1">Chiral Centers</span>
                        <span id="status-chiral" class="text-sm font-bold text-white">0</span>
                    </div>
                    <div class="bg-slate-800/50 p-2.5 rounded-xl border border-slate-700/50 flex flex-col items-center col-span-2">
                        <span class="text-[9px] text-slate-400 uppercase tracking-widest font-bold mb-1">Total Optical Isomers (Stereoisomers)</span>
                        <span id="status-total" class="text-sm font-bold text-blue-400">1</span>
                    </div>
                </div>

                <!-- Stereochemical Coach -->
                <div class="relative bg-[#162032] p-4 rounded-xl border border-slate-700 shadow-inner flex-1 mb-4">
                    <div class="absolute -top-2.5 left-4 bg-blue-500 text-white text-[9px] uppercase tracking-widest font-bold px-2 py-0.5 rounded shadow">
                        Symmetry Breakdown
                    </div>
                    <h3 id="molecule-name" class="text-md font-bold text-white mt-1 mb-2 leading-tight">Molecule Name</h3>
                    <p id="coach-text" class="text-xs text-slate-300 leading-relaxed mb-3"></p>
                    
                    <div class="pt-3 border-t border-slate-700/50">
                        <ul id="concept-bullets" class="text-xs text-slate-300 space-y-1.5 list-disc pl-4 marker:text-blue-500"></ul>
                    </div>
                </div>
                
                <div class="h-6 md:h-2 flex-shrink-0"></div> <!-- Overscroll padding -->
            </div>
        </div>
    </div>

    <!-- 3D Engine Script -->
    <script>
        // --- 1. Scene Initialization ---
        const wrapper = document.getElementById('canvas-wrapper');
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0B101E, 0.015);

        const camera = new THREE.PerspectiveCamera(45, wrapper.clientWidth / wrapper.clientHeight, 0.1, 100);
        camera.position.set(0, 4, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(wrapper.clientWidth, wrapper.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;

        // Lighting (Only affects atoms, not symmetry planes)
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- 2. Advanced Molecular Database ---
        const colors = { C: 0x444444, H: 0xffffff, O: 0xff3333, Cl: 0x33ff33 };
        const sizes = { C: 0.4, H: 0.22, O: 0.35, Cl: 0.45 };

        const molecules = {
            ethane_staggered: {
                name: "Ethane (Staggered Conformation)", active: false, chiral: 0, total: 1,
                desc: "Highly symmetrical. Contains a Center of Symmetry (COS), 3 distinct vertical Planes of Symmetry (POS), a C3 Axis of Symmetry, and an S6 Alternating Axis of Symmetry.",
                bullets: ["3 POS intersecting the C-C bond.", "Inversion point (COS) exactly halfway between carbons.", "Achiral and optically inactive."],
                atoms: [
                    { id: 'c1', elem: 'C', pos: [0, 0.76, 0] }, { id: 'c2', elem: 'C', pos: [0, -0.76, 0] },
                    { id: 'h1', elem: 'H', pos: [0, 1.16, 1.02] }, { id: 'h2', elem: 'H', pos: [0.88, 1.16, -0.51] }, { id: 'h3', elem: 'H', pos: [-0.88, 1.16, -0.51] },
                    { id: 'h4', elem: 'H', pos: [0, -1.16, -1.02] }, { id: 'h5', elem: 'H', pos: [-0.88, -1.16, 0.51] }, { id: 'h6', elem: 'H', pos: [0.88, -1.16, 0.51] }
                ],
                bonds: [['c1','c2'], ['c1','h1'], ['c1','h2'], ['c1','h3'], ['c2','h4'], ['c2','h5'], ['c2','h6']],
                chiralCenters: [],
                pos: [
                    { rot: [0, 0, 0], size: [6, 6] },
                    { rot: [0, Math.PI/3, 0], size: [6, 6] },
                    { rot: [0, -Math.PI/3, 0], size: [6, 6] }
                ],
                cos: true,
                aos: [{ p1: [0, 3, 0], p2: [0, -3, 0] }], // Vertical C3
                aaos: [{ p1: [0, 3, 0], p2: [0, -3, 0], planeRot: [Math.PI/2, 0, 0] }] // Vertical S6
            },
            meso_tartaric_anti: {
                name: "Meso-Tartaric Acid (Anti Conformation)", active: false, chiral: 2, total: 3,
                desc: "In the staggered anti conformation, the molecule lacks a Plane of Symmetry but possesses a Center of Symmetry (COS). Every group on C2 has an exact inversion match on C3.",
                bullets: ["2 Chiral centers (C2, C3).", "Optically inactive Meso compound.", "COS present, POS absent in this conformer."],
                atoms: [
                    { id: 'c2', elem: 'C', pos: [0, 0.76, 0] }, { id: 'c3', elem: 'C', pos: [0, -0.76, 0] },
                    { id: 'h2', elem: 'H', pos: [-1, 1, 0.8] }, { id: 'o2', elem: 'O', pos: [1, 1, 0.8] }, { id: 'cooh2', elem: 'C', pos: [0, 1.5, -1] },
                    { id: 'h3', elem: 'H', pos: [1, -1, -0.8] }, { id: 'o3', elem: 'O', pos: [-1, -1, -0.8] }, { id: 'cooh3', elem: 'C', pos: [0, -1.5, 1] }
                ],
                bonds: [['c2','c3'], ['c2','h2'], ['c2','o2'], ['c2','cooh2'], ['c3','h3'], ['c3','o3'], ['c3','cooh3']],
                chiralCenters: ['c2', 'c3'], pos: [], cos: true, aos: [], aaos: []
            },
            meso_tartaric_eclip: {
                name: "Meso-Tartaric Acid (Eclipsed Conformation)", active: false, chiral: 2, total: 3,
                desc: "When rotated into the eclipsed conformation, the molecule exhibits a distinct horizontal Plane of Symmetry (σ).",
                bullets: ["Internal compensation zeroes optical rotation.", "Most common textbook representation of Meso."],
                atoms: [
                    { id: 'c2', elem: 'C', pos: [0, 0.76, 0] }, { id: 'c3', elem: 'C', pos: [0, -0.76, 0] },
                    { id: 'h2', elem: 'H', pos: [-1, 1, 0.8] }, { id: 'o2', elem: 'O', pos: [1, 1, 0.8] }, { id: 'cooh2', elem: 'C', pos: [0, 1.5, -1] },
                    { id: 'h3', elem: 'H', pos: [-1, -1, 0.8] }, { id: 'o3', elem: 'O', pos: [1, -1, 0.8] }, { id: 'cooh3', elem: 'C', pos: [0, -1.5, -1] }
                ],
                bonds: [['c2','c3'], ['c2','h2'], ['c2','o2'], ['c2','cooh2'], ['c3','h3'], ['c3','o3'], ['c3','cooh3']],
                chiralCenters: ['c2', 'c3'], 
                pos: [{ rot: [Math.PI/2, 0, 0], size: [6,6] }], 
                cos: false, aos: [], aaos: []
            },
            d_tartaric: {
                name: "D-Tartaric Acid (Active)", active: true, chiral: 2, total: 3,
                desc: "Lacks both POS and COS. However, it possesses a C2 Axis of Symmetry perpendicular to the C2-C3 bond. Rotating 180 degrees yields the identical molecule, but it remains chiral.",
                bullets: ["Chiral molecule (Active).", "Possesses a C2 Axis of Symmetry (AOS)."],
                atoms: [
                    { id: 'c2', elem: 'C', pos: [0, 0.76, 0] }, { id: 'c3', elem: 'C', pos: [0, -0.76, 0] },
                    { id: 'h2', elem: 'H', pos: [-1, 1, 0.8] }, { id: 'o2', elem: 'O', pos: [1, 1, 0.8] }, { id: 'cooh2', elem: 'C', pos: [0, 1.5, -1] },
                    // C2 symmetry operation applies
                    { id: 'h3', elem: 'H', pos: [1, -1, 0.8] }, { id: 'o3', elem: 'O', pos: [-1, -1, 0.8] }, { id: 'cooh3', elem: 'C', pos: [0, -1.5, -1] }
                ],
                bonds: [['c2','c3'], ['c2','h2'], ['c2','o2'], ['c2','cooh2'], ['c3','h3'], ['c3','o3'], ['c3','cooh3']],
                chiralCenters: ['c2', 'c3'], pos: [], cos: false, 
                aos: [{ p1: [-3, 0, 0], p2: [3, 0, 0] }], // Horizontal C2 axis
                aaos: []
            },
            lactic_acid: {
                name: "D-Lactic Acid", active: true, chiral: 1, total: 2,
                desc: "Any molecule with exactly one chiral center is guaranteed to be optically active. No symmetry elements are possible.",
                bullets: ["1 Chiral Carbon.", "No POS, COS, or AOS."],
                atoms: [
                    { id: 'c1', elem: 'C', pos: [0, 0, 0] }, { id: 'o1', elem: 'O', pos: [1.2, 1.2, 0] }, 
                    { id: 'h1', elem: 'H', pos: [-1.2, 1.2, 0] }, { id: 'c2', elem: 'C', pos: [0, -1.2, 1.2] }, { id: 'c3', elem: 'C', pos: [0, -1.2, -1.2] }
                ],
                bonds: [['c1','o1'], ['c1','h1'], ['c1','c2'], ['c1','c3']],
                chiralCenters: ['c1'], pos: [], cos: false, aos: [], aaos: []
            },
            allene_even: {
                name: "1,3-Dichloroallene", active: true, chiral: 0, total: 2,
                desc: "An Even-Allene. The terminal pi-bonds are perpendicular, forcing terminal groups into mutually perpendicular planes, destroying the POS.",
                bullets: ["0 Chiral centers.", "Molecular Chirality.", "Perpendicular terminal planes."],
                atoms: [
                    { id: 'c1', elem: 'C', pos: [0, 0, 0] }, { id: 'c2', elem: 'C', pos: [1.5, 0, 0] }, { id: 'c3', elem: 'C', pos: [-1.5, 0, 0] },
                    { id: 'cl1', elem: 'Cl', pos: [2.5, 1.2, 0] }, { id: 'h1', elem: 'H', pos: [2.5, -1.2, 0] },
                    { id: 'cl2', elem: 'Cl', pos: [-2.5, 0, 1.2] }, { id: 'h2', elem: 'H', pos: [-2.5, 0, -1.2] }
                ],
                bonds: [['c1','c2'], ['c1','c3'], ['c2','cl1'], ['c2','h1'], ['c3','cl2'], ['c3','h2']],
                chiralCenters: [], pos: [], cos: false, aos: [{ p1: [0, 3, 3], p2: [0, -3, -3] }], aaos: []
            },
            allene_odd: {
                name: "1,4-Dichlorobutatriene", active: false, chiral: 0, total: 2,
                desc: "An Allene with an ODD number of double bonds (C=C=C=C). The entire molecule is planar, acting as its own Plane of Symmetry (σ).",
                bullets: ["Planar geometry.", "Exhibits Geometrical (cis/trans) isomerism, not Optical."],
                atoms: [
                    { id: 'c1', elem: 'C', pos: [0.75, 0, 0] }, { id: 'c2', elem: 'C', pos: [-0.75, 0, 0] },
                    { id: 'c3', elem: 'C', pos: [2.25, 0, 0] }, { id: 'c4', elem: 'C', pos: [-2.25, 0, 0] },
                    { id: 'cl1', elem: 'Cl', pos: [3.25, 1.2, 0] }, { id: 'h1', elem: 'H', pos: [3.25, -1.2, 0] },
                    { id: 'cl2', elem: 'Cl', pos: [-3.25, 1.2, 0] }, { id: 'h2', elem: 'H', pos: [-3.25, -1.2, 0] }
                ],
                bonds: [['c1','c2'], ['c1','c3'], ['c2','c4'], ['c3','cl1'], ['c3','h1'], ['c4','cl2'], ['c4','h2']],
                chiralCenters: [], pos: [{ rot: [0, 0, 0], size: [10, 6] }], cos: false, aos: [], aaos: []
            },
            cis_cyclopropane: {
                name: "cis-1,2-Dimethylcyclopropane", active: false, chiral: 2, total: 3,
                desc: "Both methyl groups point in the same direction. A Plane of Symmetry bisects the C3 carbon and cuts straight through the C1-C2 bond.",
                bullets: ["Meso compound due to the Plane of Symmetry.", "Optically inactive despite having 2 chiral centers."],
                atoms: [
                    { id: 'c1', elem: 'C', pos: [-0.8, 0, 0.5] }, { id: 'c2', elem: 'C', pos: [0.8, 0, 0.5] }, { id: 'c3', elem: 'C', pos: [0, 0, -0.9] },
                    { id: 'me1', elem: 'C', pos: [-1.4, 1.2, 1] }, { id: 'me2', elem: 'C', pos: [1.4, 1.2, 1] }
                ],
                bonds: [['c1','c2'], ['c2','c3'], ['c3','c1'], ['c1','me1'], ['c2','me2']],
                chiralCenters: ['c1', 'c2'], pos: [{ rot: [0, Math.PI/2, 0], size: [6, 6] }], cos: false, aos: [], aaos: []
            }
        };

        // --- 3. Engine Core ---
        let mainGroup = new THREE.Group();
        scene.add(mainGroup);

        let activeToggles = { pos: true, cos: true, aos: true, aaos: true, chiral: true };
        let elementsMap = { pos: [], cos: [], aos: [], aaos: [], chiral: [] };
        let currentData = null;
        let isAutoRotating = true;

        // Memory Management: Clear old meshes safely
        function disposeGroup(group) {
            group.children.forEach(child => {
                if (child.geometry) child.geometry.dispose();
                if (child.material) {
                    if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                    else child.material.dispose();
                }
                if (child.children.length > 0) disposeGroup(child);
            });
        }

        function buildMolecule(key) {
            if (mainGroup) {
                scene.remove(mainGroup);
                disposeGroup(mainGroup);
            }
            
            mainGroup = new THREE.Group();
            currentData = molecules[key];
            const atomMeshes = {};
            elementsMap = { pos: [], cos: [], aos: [], aaos: [], chiral: [] };

            // 1. Atoms & Chiral Highlights
            currentData.atoms.forEach(atom => {
                const geo = new THREE.SphereGeometry(sizes[atom.elem], 32, 32);
                const mat = new THREE.MeshPhysicalMaterial({ color: colors[atom.elem], metalness: 0.1, roughness: 0.4, clearcoat: 0.5 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(...atom.pos);
                mainGroup.add(mesh);
                atomMeshes[atom.id] = mesh;

                if (currentData.chiralCenters.includes(atom.id)) {
                    const glowMat = new THREE.MeshBasicMaterial({ color: 0xf59e0b, transparent: true, opacity: 0.4, depthWrite: false });
                    const glow = new THREE.Mesh(new THREE.SphereGeometry(sizes[atom.elem] * 1.6, 16, 16), glowMat);
                    glow.position.set(...atom.pos);
                    mainGroup.add(glow);
                    elementsMap.chiral.push(glow);
                }
            });

            // 2. Bonds
            currentData.bonds.forEach(bond => {
                const start = atomMeshes[bond[0]].position;
                const end = atomMeshes[bond[1]].position;
                const cyl = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.08, 0.08, start.distanceTo(end), 16),
                    new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.4 })
                );
                cyl.position.copy(end.clone().add(start).divideScalar(2));
                cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), end.clone().sub(start).normalize());
                mainGroup.add(cyl);
            });

            // 3. POS
            currentData.pos.forEach(planeDef => {
                const pGrp = new THREE.Group();
                const pMesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(...planeDef.size),
                    new THREE.MeshBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.15, side: THREE.DoubleSide, depthWrite: false })
                );
                const grid = new THREE.GridHelper(Math.max(...planeDef.size), 10, 0x3b82f6, 0x3b82f6);
                grid.rotation.x = Math.PI / 2;
                grid.material.opacity = 0.25;
                grid.material.transparent = true;
                pGrp.add(pMesh, grid);
                pGrp.rotation.set(...planeDef.rot);
                mainGroup.add(pGrp);
                elementsMap.pos.push(pGrp);
            });

            // 4. COS
            if (currentData.cos) {
                const cosGrp = new THREE.Group();
                cosGrp.add(new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), new THREE.MeshBasicMaterial({ color: 0xa855f7 })));
                
                const checked = new Set();
                currentData.atoms.forEach(a1 => {
                    if (checked.has(a1.id)) return;
                    const v1 = atomMeshes[a1.id].position;
                    const inv = currentData.atoms.find(a2 => {
                        const v2 = atomMeshes[a2.id].position;
                        return a1.elem === a2.elem && Math.abs(v1.x + v2.x) < 0.1 && Math.abs(v1.y + v2.y) < 0.1 && Math.abs(v1.z + v2.z) < 0.1;
                    });
                    if (inv && inv.id !== a1.id) {
                        checked.add(inv.id);
                        const line = new THREE.Line(
                            new THREE.BufferGeometry().setFromPoints([v1, new THREE.Vector3(0,0,0), atomMeshes[inv.id].position]),
                            new THREE.LineDashedMaterial({ color: 0xa855f7, dashSize: 0.15, gapSize: 0.1 })
                        );
                        line.computeLineDistances();
                        cosGrp.add(line);
                    }
                });
                mainGroup.add(cosGrp);
                elementsMap.cos.push(cosGrp);
            }

            // 5. AOS
            currentData.aos.forEach(ax => {
                const p1 = new THREE.Vector3(...ax.p1);
                const p2 = new THREE.Vector3(...ax.p2);
                const cyl = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.04, 0.04, p1.distanceTo(p2), 8),
                    new THREE.MeshBasicMaterial({ color: 0x10b981 })
                );
                cyl.position.copy(p2.clone().add(p1).divideScalar(2));
                cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), p2.clone().sub(p1).normalize());
                mainGroup.add(cyl);
                elementsMap.aos.push(cyl);
            });

            // 6. AAOS
            currentData.aaos.forEach(ax => {
                const grp = new THREE.Group();
                const p1 = new THREE.Vector3(...ax.p1);
                const p2 = new THREE.Vector3(...ax.p2);
                const cyl = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.04, 0.04, p1.distanceTo(p2), 8),
                    new THREE.MeshBasicMaterial({ color: 0xf43f5e })
                );
                cyl.position.copy(p1).add(p2).divideScalar(2);
                cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), p2.clone().sub(p1).normalize());
                
                const pMesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(5, 5),
                    new THREE.MeshBasicMaterial({ color: 0xf43f5e, transparent: true, opacity: 0.15, side: THREE.DoubleSide, depthWrite: false })
                );
                pMesh.rotation.set(...ax.planeRot);
                
                grp.add(cyl, pMesh);
                mainGroup.add(grp);
                elementsMap.aaos.push(grp);
            });

            scene.add(mainGroup);
            updateUI();
            applyToggles();
        }

        // --- 4. Interface Management ---
        function updateUI() {
            document.getElementById('molecule-name').innerText = currentData.name;
            document.getElementById('coach-text').innerText = currentData.desc;
            
            const actNode = document.getElementById('status-activity');
            actNode.innerText = currentData.active ? "Yes (Active)" : "No (Achiral)";
            actNode.className = currentData.active ? "text-xs md:text-sm font-bold text-emerald-400" : "text-xs md:text-sm font-bold text-red-400";
            
            document.getElementById('status-chiral').innerText = currentData.chiralCenters.length;
            document.getElementById('status-total').innerText = currentData.total;

            const bullets = document.getElementById('concept-bullets');
            bullets.innerHTML = '';
            currentData.bullets.forEach(b => {
                const li = document.createElement('li'); li.innerText = b;
                bullets.appendChild(li);
            });

            // Handle Toggle Buttons Styling
            ['pos', 'cos', 'aos', 'aaos', 'chiral'].forEach(type => {
                const btn = document.getElementById(`btn-${type}`);
                const hasElement = (type === 'cos') ? currentData.cos : (currentData[type === 'chiral' ? 'chiralCenters' : type].length > 0);
                
                if (!hasElement) {
                    btn.classList.add('opacity-30', 'cursor-not-allowed', 'grayscale');
                    btn.classList.remove('opacity-100');
                    btn.querySelector('.indicator').classList.add('hidden');
                } else {
                    btn.classList.remove('opacity-30', 'cursor-not-allowed', 'grayscale');
                    btn.querySelector('.indicator').classList.remove('hidden');
                    btn.style.opacity = activeToggles[type] ? '1' : '0.5';
                }
            });
        }

        function applyToggles() {
            Object.keys(elementsMap).forEach(key => {
                elementsMap[key].forEach(mesh => mesh.visible = activeToggles[key]);
            });
        }

        // Event Listeners
        ['pos', 'cos', 'aos', 'aaos', 'chiral'].forEach(type => {
            document.getElementById(`btn-${type}`).addEventListener('click', (e) => {
                const hasElement = (type === 'cos') ? currentData.cos : (currentData[type === 'chiral' ? 'chiralCenters' : type].length > 0);
                if (!hasElement) return;
                
                activeToggles[type] = !activeToggles[type];
                applyToggles();
                e.currentTarget.style.opacity = activeToggles[type] ? '1' : '0.5';
            });
        });

        document.getElementById('molecule-select').addEventListener('change', (e) => {
            buildMolecule(e.target.value);
            mainGroup.rotation.set(0,0,0);
            controls.target.set(0,0,0);
        });

        const btnAuto = document.getElementById('toggle-autorotate');
        btnAuto.addEventListener('click', (e) => {
            isAutoRotating = !isAutoRotating;
            e.target.innerText = isAutoRotating ? "Pause Auto-Rotation" : "Resume Auto-Rotation";
            e.target.className = isAutoRotating 
                ? "absolute bottom-4 left-4 bg-slate-800/80 hover:bg-slate-700 text-white border border-slate-600 backdrop-blur-sm px-3 py-1.5 rounded-lg text-xs font-semibold shadow-lg transition-colors z-20"
                : "absolute bottom-4 left-4 bg-blue-600/80 hover:bg-blue-500 text-white border border-blue-500 backdrop-blur-sm px-3 py-1.5 rounded-lg text-xs font-semibold shadow-lg transition-colors z-20";
        });

        // Robust ResizeObserver for flawless adaptive scaling (Prevents layout overflow loop)
        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                const { width, height } = entry.contentRect;
                if (width > 0 && height > 0) {
                    camera.aspect = width / height;
                    camera.updateProjectionMatrix();
                    renderer.setSize(width, height);
                }
            }
        });
        resizeObserver.observe(wrapper);

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (isAutoRotating && mainGroup) {
                mainGroup.rotation.y += 0.0035;
                mainGroup.rotation.x += 0.0015;
            }
            renderer.render(scene, camera);
        }

        buildMolecule('ethane_staggered');
        animate();
    </script>
</body>
</html>
