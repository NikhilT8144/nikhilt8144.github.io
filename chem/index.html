<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Molecular Symmetry Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1a1a1e;
            --accent-color: #6366f1;
            --text-color: #e4e4e7;
            --text-muted: #a1a1aa;
            --pos-color: #06b6d4;
            --cos-color: #d946ef;
            --aos-color: #eab308;
            --aaos-color: #f97316;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout Structure - Row on Desktop, Column on Mobile */
        #app-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
        }

        #viewer-container {
            flex: 1;
            position: relative;
            background-color: #09090b;
            height: 100%;
        }

        #gldiv {
            width: 100%;
            height: 100%;
        }

        #sidebar {
            width: 420px;
            background-color: var(--panel-bg);
            border-left: 1px solid #27272a;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        p.subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .section {
            background: #222227;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2e2e35;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Form styling */
        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: var(--text-color);
        }

        select, textarea, input[type="number"] {
            width: 100%;
            background-color: #121214;
            border: 1px solid #3f3f46;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        textarea {
            font-family: monospace;
            resize: vertical;
            height: 100px;
        }

        .vector-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        /* Checkbox & Symmetry Toggles */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 0;
        }

        .toggle-container input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
        }

        .pos-header { color: var(--pos-color); }
        .cos-header { color: var(--cos-color); }
        .aos-header { color: var(--aos-color); }
        .aaos-header { color: var(--aaos-color); }

        .control-group {
            margin-left: 28px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
            font-size: 0.9rem;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Help Legend Overlay */
        #canvas-overlay {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(26, 26, 30, 0.9);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #27272a;
            pointer-events: none;
            font-size: 0.75rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            z-index: 10;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

        /* Responsive Breakpoint for Mobile Devices */
        @media (max-width: 768px) {
            body {
                overflow: auto;
            }
            #app-container {
                flex-direction: column;
                height: auto;
            }
            #viewer-container {
                height: 50vh; /* Takes half the screen height on mobile */
                width: 100%;
                position: sticky;
                top: 0;
                z-index: 100;
                border-bottom: 1px solid #27272a;
            }
            #sidebar {
                width: 100%;
                height: auto;
                overflow-y: visible;
                border-left: none;
                padding: 15px;
            }
            #canvas-overlay {
                grid-template-columns: 1fr;
                bottom: 10px;
                left: 10px;
                right: auto;
                max-width: 280px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="viewer-container">
        <div id="gldiv"></div>
        <div id="canvas-overlay">
            <div class="legend-item"><span class="dot" style="background: var(--pos-color)"></span> POS: Plane (Cyan)</div>
            <div class="legend-item"><span class="dot" style="background: var(--cos-color)"></span> COS: Center (Magenta)</div>
            <div class="legend-item"><span class="dot" style="background: var(--aos-color)"></span> AOS: Axis (Yellow)</div>
            <div class="legend-item"><span class="dot" style="background: var(--aaos-color)"></span> AAOS: Alt Axis (Orange)</div>
        </div>
    </div>

    <div id="sidebar">
        <div>
            <h1>Symmetry Visualizer</h1>
            <p class="subtitle">Drag to rotate. Pinch/Scroll to zoom.</p>
        </div>

        <div class="section">
            <div class="section-title">Select or Input Compound</div>
            <label for="presetSelect">Preloaded Configurations</label>
            <select id="presetSelect" onchange="loadPreset()">
                <option value="trans_dichloro">trans-1,2-dichloroethene (POS, COS, AOS)</option>
                <option value="allene">Allene (POS, AOS, AAOS / S4)</option>
                <option value="methane">Methane (POS, AOS, AAOS / S4)</option>
                <option value="custom">-- Custom 3D Coordinates (.XYZ) --</option>
            </select>

            <div id="customInputBlock" style="display: none;">
                <label for="xyzData">Paste XYZ Data Format</label>
                <textarea id="xyzData" placeholder="Paste standard .xyz coordinates here..."></textarea>
                <button onclick="loadCustomCoordinates()">Render Custom Molecule</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Symmetry Overlays</div>
            
            <label class="toggle-container pos-header">
                <input type="checkbox" id="enablePOS" onchange="applySymmetryElements()" checked> Plane of Symmetry (POS)
            </label>
            <div class="control-group">
                <div class="vector-row">
                    <div>Nx<input type="number" id="posNx" value="0" step="0.1" oninput="applySymmetryElements()"></div>
                    <div>Ny<input type="number" id="posNy" value="0" step="0.1" oninput="applySymmetryElements()"></div>
                    <div>Nz<input type="number" id="posNz" value="1" step="0.1" oninput="applySymmetryElements()"></div>
                </div>
                <div style="margin-bottom: 12px;">
                    Offset Distance
                    <input type="number" id="posOffset" value="0" step="0.1" oninput="applySymmetryElements()">
                </div>
            </div>

            <label class="toggle-container cos-header">
                <input type="checkbox" id="enableCOS" onchange="applySymmetryElements()" checked> Center of Symmetry (COS)
            </label>
            <div class="control-group">
                <div class="vector-row" style="margin-bottom: 12px;">
                    <div>X<input type="number" id="cosX" value="0" step="0.1" oninput="applySymmetryElements()"></div>
                    <div>Y<input type="number" id="cosY" value="0" step="0.1" oninput="applySymmetryElements()"></div>
                    <div>Z<input type="number" id="cosZ" value="0" step="0.1" oninput="applySymmetryElements()"></div>
                </div>
            </div>

            <label class="toggle-container aos-header">
                <input type="checkbox" id="enableAOS" onchange="applySymmetryElements()" checked> Axis of Symmetry (AOS)
            </label>
            <div class="control-group">
                <div class="vector-row" style="margin-bottom: 12px;">
                    <div>Vx<input type="number" id="aosDx" value="0" step="0.1" oninput="applySymmetryElements()"></div>
                    <div>Vy<input type="number" id="aosDy" value="0" step="0.1" oninput="applySymmetryElements()"></div>
                    <div>Vz<input type="number" id="aosDz" value="1" step="0.1" oninput="applySymmetryElements()"></div>
                </div>
            </div>

            <label class="toggle-container aaos-header">
                <input type="checkbox" id="enableAAOS" onchange="applySymmetryElements()" checked> Alternating Axis (AAOS)
            </label>
            <div class="control-group">
                <div class="vector-row">
                    <div>Vx<input type="number" id="aaosDx" value="0" step="0.1" oninput="applySymmetryElements()"></div>
                    <div>Vy<input type="number" id="aaosDy" value="0" step="0.1" oninput="applySymmetryElements()"></div>
                    <div>Vz<input type="number" id="aaosDz" value="1" step="0.1" oninput="applySymmetryElements()"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Molecular Preset Database (.XYZ Format)
    const presets = {
        trans_dichloro: {
            xyz: `6\ntrans-1,2-dichloroethene\nC  -0.665  0.565  0.000\nC   0.665 -0.565  0.000\nH  -0.491  1.633  0.000\nH   0.491 -1.633  0.000\nCl -2.270  0.045  0.000\nCl  2.270 -0.045  0.000`,
            pos: { enable: true, nx: 0, ny: 0, nz: 1, offset: 0 },
            cos: { enable: true, x: 0, y: 0, z: 0 },
            aos: { enable: true, dx: 0, dy: 0, dz: 1 },
            aaos: { enable: false, dx: 0, dy: 0, dz: 0 }
        },
        allene: {
            xyz: `7\nAllene\nC   0.0000   0.0000   1.3000\nC   0.0000   0.0000   0.0000\nC   0.0000   0.0000  -1.3000\nH   0.9220   0.0000   1.8500\nH  -0.9220   0.0000   1.8500\nH   0.0000   0.9220  -1.8500\nH   0.0000  -0.9220  -1.8500`,
            pos: { enable: true, nx: 1, ny: 0, nz: 0, offset: 0 },
            cos: { enable: false, x: 0, y: 0, z: 0 },
            aos: { enable: true, dx: 0, dy: 0, dz: 1 },
            aaos: { enable: true, dx: 0, dy: 0, dz: 1 }
        },
        methane: {
            xyz: `5\nMethane\nC  0.0000  0.0000  0.0000\nH  0.6291  0.6291  0.6291\nH -0.6291 -0.6291  0.6291\nH -0.6291  0.6291 -0.6291\nH  0.6291 -0.6291 -0.6291`,
            pos: { enable: true, nx: 1, ny: -1, nz: 0, offset: 0 },
            cos: { enable: false, x: 0, y: 0, z: 0 },
            aos: { enable: true, dx: 0, dy: 0, dz: 1 },
            aaos: { enable: true, dx: 0, dy: 0, dz: 1 }
        }
    };

    let glviewer = null;

    // Initialize 3D Canvas
    window.onload = function() {
        glviewer = $3Dmol.createViewer("gldiv", { defaultcolors: $3Dmol.rasmolElementColors });
        glviewer.setBackgroundColor(0x0e0e11);
        loadPreset();

        // Handle structural resizing changes for orientation shifts
        window.addEventListener('resize', () => {
            if(glviewer) glviewer.resize();
        });
    };

    function loadPreset() {
        const key = document.getElementById("presetSelect").value;
        const customBlock = document.getElementById("customInputBlock");

        if (key === "custom") {
            customBlock.style.display = "block";
            return;
        } else {
            customBlock.style.display = "none";
        }

        const data = presets[key];
        
        document.getElementById("enablePOS").checked = data.pos.enable;
        document.getElementById("posNx").value = data.pos.nx;
        document.getElementById("posNy").value = data.pos.ny;
        document.getElementById("posNz").value = data.pos.nz;
        document.getElementById("posOffset").value = data.pos.offset;

        document.getElementById("enableCOS").checked = data.cos.enable;
        document.getElementById("cosX").value = data.cos.x;
        document.getElementById("cosY").value = data.cos.y;
        document.getElementById("cosZ").value = data.cos.z;

        document.getElementById("enableAOS").checked = data.aos.enable;
        document.getElementById("aosDx").value = data.aos.dx;
        document.getElementById("aosDy").value = data.aos.dy;
        document.getElementById("aosDz").value = data.aos.dz;

        document.getElementById("enableAAOS").checked = data.aaos.enable;
        document.getElementById("aaosDx").value = data.aaos.dx;
        document.getElementById("aaosDy").value = data.aaos.dy;
        document.getElementById("aaosDz").value = data.aaos.dz;

        renderMolecule(data.xyz);
    }

    function loadCustomCoordinates() {
        const customXYZ = document.getElementById("xyzData").value;
        if(!customXYZ.trim()) {
            alert("Please paste valid XYZ dataset format.");
            return;
        }
        renderMolecule(customXYZ);
    }

    function renderMolecule(xyzString) {
        glviewer.clear();
        glviewer.addModel(xyzString, "xyz");
        glviewer.setStyle({}, { stick: { radius: 0.12 }, sphere: { radius: 0.35 } });
        glviewer.zoomTo();
        applySymmetryElements();
    }

    function applySymmetryElements() {
        if (!glviewer) return;
        glviewer.removeAllShapes();

        // 1. PLANE OF SYMMETRY (POS)
        if (document.getElementById("enablePOS").checked) {
            let nx = parseFloat(document.getElementById("posNx").value) || 0;
            let ny = parseFloat(document.getElementById("posNy").value) || 0;
            let nz = parseFloat(document.getElementById("posNz").value) || 0;
            let offset = parseFloat(document.getElementById("posOffset").value) || 0;

            let magnitude = Math.sqrt(nx*nx + ny*ny + nz*nz);
            if (magnitude > 0) {
                nx /= magnitude; ny /= magnitude; nz /= magnitude;
                let cx = nx * offset; let cy = ny * offset; let cz = nz * offset;

                glviewer.addCylinder({
                    start: {x: cx - (0.01 * nx), y: cy - (0.01 * ny), z: cz - (0.01 * nz)},
                    end: {x: cx + (0.01 * nx), y: cy + (0.01 * ny), z: cz + (0.01 * nz)},
                    radius: 3.2,
                    color: '#06b6d4',
                    opacity: 0.4,
                    fromCap: true, toCap: true
                });
            }
        }

        // 2. CENTER OF SYMMETRY (COS)
        if (document.getElementById("enableCOS").checked) {
            let cx = parseFloat(document.getElementById("cosX").value) || 0;
            let cy = parseFloat(document.getElementById("cosY").value) || 0;
            let cz = parseFloat(document.getElementById("cosZ").value) || 0;

            glviewer.addSphere({
                center: {x: cx, y: cy, z: cz},
                radius: 0.22,
                color: '#d946ef',
                opacity: 0.85
            });
        }

        // 3. AXIS OF SYMMETRY (AOS)
        if (document.getElementById("enableAOS").checked) {
            let ax = parseFloat(document.getElementById("aosDx").value) || 0;
            let ay = parseFloat(document.getElementById("aosDy").value) || 0;
            let az = parseFloat(document.getElementById("aosDz").value) || 0;

            let magnitude = Math.sqrt(ax*ax + ay*ay + az*az);
            if (magnitude > 0) {
                ax /= magnitude; ay /= magnitude; az /= magnitude;
                glviewer.addCylinder({
                    start: {x: ax * -4.5, y: ay * -4.5, z: az * -4.5},
                    end: {x: ax * 4.5, y: ay * 4.5, z: az * 4.5},
                    radius: 0.06,
                    color: '#eab308',
                    opacity: 0.85
                });
            }
        }

        // 4. ALTERNATING AXIS OF SYMMETRY (AAOS)
        if (document.getElementById("enableAAOS").checked) {
            let dax = parseFloat(document.getElementById("aaosDx").value) || 0;
            let day = parseFloat(document.getElementById("aaosDy").value) || 0;
            let daz = parseFloat(document.getElementById("aaosDz").value) || 0;

            let magnitude = Math.sqrt(dax*dax + day*day + daz*daz);
            if (magnitude > 0) {
                dax /= magnitude; day /= magnitude; daz /= magnitude;
                glviewer.addCylinder({
                    start: {x: dax * -4.5, y: day * -4.5, z: daz * -4.5},
                    end: {x: dax * 4.5, y: day * 4.5, z: daz * 4.5},
                    radius: 0.06,
                    color: '#f97316',
                    opacity: 0.85
                });
            }
        }

        glviewer.render();
    }
</script>
</body>
</html>
