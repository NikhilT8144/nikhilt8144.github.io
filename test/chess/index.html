<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynapseChess // Neural AI Interface</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0B0F19;
            color: #cbd5e1;
        }
        
        /* 3D Transform for smooth board rotations when switching sides */
        #board-container {
            transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(19, 27, 47, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Board Square Aesthetics */
        .sq-light { background-color: #94a3b8; color: #475569; }
        .sq-dark { background-color: #475569; color: #94a3b8; }
        
        /* Eliminate Ghost Dragging on Piece SVGs */
        img.chess-piece {
            -webkit-user-drag: none;
            user-select: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 lg:p-8 selection:bg-emerald-500/30 overflow-x-hidden">

    <div class="max-w-6xl w-full mx-auto flex flex-col lg:flex-row gap-8 items-center lg:items-start justify-center">
        
        <div class="w-full lg:w-80 flex flex-col gap-6 main-panel">
            <div class="glass-panel rounded-2xl p-6 shadow-2xl relative overflow-hidden">
                 <div class="absolute -top-12 -right-12 w-40 h-40 bg-emerald-500/20 rounded-full blur-[40px] pointer-events-none"></div>
                 
                 <h1 class="text-2xl font-bold text-white tracking-tight flex items-center gap-2 mb-1 relative z-10">
                     <i data-lucide="cpu" class="w-6 h-6 text-emerald-400"></i> SYNAPSE<span class="text-emerald-400 font-light">CHESS</span>
                 </h1>
                 <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold mb-6 relative z-10">Stockfish AI Core Client</p>
                 
                 <div class="bg-black/40 rounded-xl p-4 border border-white/5 mb-6 relative z-10">
                     <div class="flex items-center justify-between mb-3 pb-3 border-b border-white/5">
                         <span class="text-xs text-slate-400 font-medium">Game State</span>
                         <span id="game-status" class="text-xs font-bold text-white">White to move</span>
                     </div>
                     <div class="flex items-center justify-between">
                         <span class="text-xs text-slate-400 font-medium">AI Compute Node</span>
                         <div class="flex items-center gap-2">
                             <i data-lucide="loader-2" id="engine-spinner" class="w-3.5 h-3.5 text-emerald-400 animate-spin hidden"></i>
                             <span id="engine-status" class="text-xs font-bold text-emerald-400">Booting Sequence...</span>
                         </div>
                     </div>
                 </div>

                 <div class="space-y-5 relative z-10">
                     <div>
                         <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-2 block flex items-center gap-1.5"><i data-lucide="zap" class="w-3 h-3"></i> AI Depth Protocol</label>
                         <div class="grid grid-cols-5 gap-1 bg-black/40 p-1 rounded-lg border border-white/5" id="level-selector">
                             </div>
                     </div>
                     <div>
                         <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-2 block flex items-center gap-1.5"><i data-lucide="user" class="w-3 h-3"></i> Player Assignment</label>
                         <div class="flex gap-2">
                             <button id="btn-play-white" onclick="setPlayerColor('w')" class="flex-1 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 rounded-lg py-2 text-sm font-semibold transition-all shadow-md shadow-emerald-500/10">White</button>
                             <button id="btn-play-black" onclick="setPlayerColor('b')" class="flex-1 bg-black/40 hover:bg-white/5 text-slate-400 border border-white/5 rounded-lg py-2 text-sm font-semibold transition-all">Black</button>
                         </div>
                     </div>
                 </div>

                 <button onclick="startNewGame()" class="w-full mt-8 bg-slate-100 text-slate-900 hover:bg-white font-bold rounded-xl py-3 shadow-[0_0_20px_rgba(255,255,255,0.1)] transition-all active:scale-[0.97] flex items-center justify-center gap-2 relative z-10">
                     <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Initialize Sequence
                 </button>
            </div>
        </div>

        <div class="flex-1 w-full max-w-[640px] flex items-center justify-center relative main-panel">
            <div id="board-container" class="w-full aspect-square rounded-xl overflow-hidden shadow-[0_0_50px_rgba(16,185,129,0.05)] border border-slate-700/50 bg-[#131B2F] relative">
                
                <div id="squares-layer" class="absolute inset-0 grid grid-cols-8 grid-rows-8"></div>
                
                <div id="highlights-layer" class="absolute inset-0 grid grid-cols-8 grid-rows-8 pointer-events-none"></div>

                <div id="pieces-layer" class="absolute inset-0 pointer-events-none"></div>

            </div>
        </div>
    </div>

    <div id="game-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="glass-panel border border-white/10 p-8 rounded-2xl shadow-2xl text-center transform scale-95 transition-transform duration-300 w-80" id="modal-content">
            <div class="w-16 h-16 rounded-full bg-emerald-500/20 flex items-center justify-center mx-auto mb-4 border border-emerald-500/30">
                <i data-lucide="award" class="w-8 h-8 text-emerald-400"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2 tracking-tight" id="modal-title">Protocol Terminated</h2>
            <p class="text-sm text-slate-400 mb-6 leading-relaxed" id="modal-desc">Match conclusion reached.</p>
            <button onclick="closeModal(); startNewGame();" class="bg-emerald-500 text-slate-900 hover:bg-emerald-400 font-bold px-6 py-2.5 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all active:scale-[0.97] w-full">Play Again</button>
        </div>
    </div>

    <script>
        // --- 1. Memory State Arrays & Libraries ---
        const game = new Chess();
        const FILES = ['a','b','c','d','e','f','g','h'];
        let playerColor = 'w';
        let engineWorker = null;
        let selectedSquare = null;
        let lastMove = null;
        
        let pieceIdCounter = 0;
        let activePieces = []; // Matrix tracking vector objects for animations

        // Wikimedia Standard High-Fidelity SVG Chess Graphics
        const pieceImages = {
            'wP': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg',
            'wN': 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
            'wB': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
            'wR': 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
            'wQ': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
            'wK': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
            'bP': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg',
            'bN': 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
            'bB': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
            'bR': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
            'bQ': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
            'bK': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg'
        };

        // --- AI Configuration Settings ---
        const LEVELS = {
            1: { skill: 0, depth: 1 },
            2: { skill: 4, depth: 3 },
            3: { skill: 8, depth: 7 },
            4: { skill: 14, depth: 12 },
            5: { skill: 20, depth: 18 }
        };
        let currentLevel = 3;

        // --- 2. Interface Render & Board Generation Logic ---
        function initBoardGrid() {
            const squaresLayer = document.getElementById('squares-layer');
            const highlightsLayer = document.getElementById('highlights-layer');

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sqName = FILES[c] + (8 - r);
                    
                    // Native Hitbox Squares
                    const sq = document.createElement('div');
                    sq.className = `w-full h-full ${(r+c)%2 === 0 ? 'sq-light' : 'sq-dark'} relative flex justify-start items-end p-1 text-[10px] font-bold select-none cursor-pointer transition-colors duration-150 active:brightness-90`;
                    sq.dataset.sq = sqName;
                    sq.addEventListener('click', () => handleSquareClick(sqName));
                    
                    if (c === 0) sq.innerHTML += `<span class="coord-label absolute top-1 left-1 opacity-60">${8-r}</span>`;
                    if (r === 7) sq.innerHTML += `<span class="coord-label absolute bottom-1 right-1 opacity-60">${FILES[c]}</span>`;

                    squaresLayer.appendChild(sq);

                    // Overlay Action Highlights
                    const hl = document.createElement('div');
                    hl.id = 'hl-' + sqName;
                    hl.className = 'w-full h-full flex items-center justify-center transition-all duration-200';
                    highlightsLayer.appendChild(hl);
                }
            }
            buildLevelUI();
        }

        // Coordinate Translation System for Matrix Animations
        const getCoords = (sq) => ({ x: FILES.indexOf(sq[0]), y: 8 - parseInt(sq[1]) });

        function initPieces() {
            activePieces = [];
            const board = game.board();
            for(let r=0; r<8; r++){
                for(let c=0; c<8; c++){
                    if(board[r][c]){
                        activePieces.push({
                            id: 'p' + pieceIdCounter++,
                            type: board[r][c].type,
                            color: board[r][c].color,
                            sq: FILES[c] + (8-r)
                        });
                    }
                }
            }
            document.getElementById('pieces-layer').innerHTML = '';
            renderPieces();
        }

        function renderPieces() {
            const boardEl = document.getElementById('pieces-layer');
            const existingIds = Array.from(boardEl.children).map(el => el.id);
            const activeIds = activePieces.map(p => p.id);

            // Phase out captured pieces
            existingIds.forEach(id => {
                if (!activeIds.includes(id)) {
                    const el = document.getElementById(id);
                    el.style.opacity = '0';
                    el.style.transform += ' scale(0.3)';
                    setTimeout(() => el.remove(), 200);
                }
            });

            // Re-map transformations for smooth gliding
            activePieces.forEach(p => {
                const coords = getCoords(p.sq);
                const x = coords.x * 100;
                const y = coords.y * 100;
                const rotation = playerColor === 'b' ? 'rotate(180deg)' : 'rotate(0deg)';
                
                let el = document.getElementById(p.id);
                if (!el) {
                    el = document.createElement('img');
                    el.id = p.id;
                    el.src = pieceImages[`${p.color}${p.type.toUpperCase()}`];
                    el.className = 'chess-piece absolute w-[12.5%] h-[12.5%] object-contain transition-all duration-300 ease-out z-10 drop-shadow-xl';
                    // Apply translation instantly to prevent sliding in from (0,0) edge
                    el.style.transform = `translate(${x}%, ${y}%) ${rotation}`;
                    boardEl.appendChild(el);
                } else {
                    el.style.transform = `translate(${x}%, ${y}%) ${rotation}`;
                    el.src = pieceImages[`${p.color}${p.type.toUpperCase()}`]; // Catch pawn promotions dynamically
                }
            });
        }

        function updateHighlights() {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sqName = FILES[c] + (8-r);
                    const hl = document.getElementById('hl-' + sqName);
                    hl.innerHTML = '';
                    hl.className = 'w-full h-full flex items-center justify-center transition-colors duration-200';
                    
                    if (lastMove && (lastMove.from === sqName || lastMove.to === sqName)) hl.classList.add('bg-emerald-500/20');
                    if (selectedSquare === sqName) hl.classList.add('bg-emerald-400/40');
                    
                    // Render legal move indicator targets
                    if (selectedSquare) {
                        const moves = game.moves({ square: selectedSquare, verbose: true });
                        if (moves.some(m => m.to === sqName)) {
                            const isCapture = game.get(sqName) !== null;
                            if (isCapture) hl.innerHTML = `<div class="w-[85%] h-[85%] rounded-full border-[5px] border-black/30"></div>`;
                            else hl.innerHTML = `<div class="w-[28%] h-[28%] rounded-full bg-black/30 drop-shadow-md"></div>`;
                        }
                    }
                }
            }
        }

        // --- 3. Interaction Event Handlers ---
        function handleSquareClick(sq) {
            if (game.game_over() || game.turn() !== playerColor) return;

            if (selectedSquare) {
                // Attempt local player turn logic execution
                let move = game.move({ from: selectedSquare, to: sq, promotion: 'q' });
                if (move) {
                    processExecutedMove(move);
                    selectedSquare = null;
                    updateHighlights();
                    triggerEngine();
                } else {
                    // Allows switching piece selection cleanly without deselecting
                    const piece = game.get(sq);
                    selectedSquare = (piece && piece.color === game.turn()) ? sq : null;
                    updateHighlights();
                }
            } else {
                const piece = game.get(sq);
                if (piece && piece.color === game.turn()) {
                    selectedSquare = sq;
                    updateHighlights();
                }
            }
        }

        function processExecutedMove(move) {
            // Remove captured entities
            if (move.captured) {
                let capSq = move.flags.includes('e') ? move.to[0] + move.from[1] : move.to;
                let targetPiece = activePieces.find(p => p.sq === capSq && p.id !== activePieces.find(mp => mp.sq === move.from)?.id);
                if (targetPiece) activePieces = activePieces.filter(p => p.id !== targetPiece.id);
            }
            
            // Advance active piece
            let movingPiece = activePieces.find(p => p.sq === move.from);
            if (movingPiece) {
                movingPiece.sq = move.to;
                if (move.flags.includes('p')) movingPiece.type = move.promotion;
            }

            // Sync structural castling shifts
            if (move.flags.includes('k')) {
                let rook = activePieces.find(p => p.sq === ('h' + move.from[1]));
                if (rook) rook.sq = 'f' + move.from[1];
            } else if (move.flags.includes('q')) {
                let rook = activePieces.find(p => p.sq === ('a' + move.from[1]));
                if (rook) rook.sq = 'd' + move.from[1];
            }

            lastMove = { from: move.from, to: move.to };
            renderPieces();
            checkStatus();
        }

        // --- 4. Web Worker Engine Architecture ---
        async function initStockfish() {
            try {
                document.getElementById('engine-status').innerText = "Loading AI Core...";
                // Load core engine text securely to bypass standard Worker URL CORS limitations
                const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js');
                const code = await response.text();
                const blob = new Blob([code], { type: 'application/javascript' });
                
                engineWorker = new Worker(URL.createObjectURL(blob));
                engineWorker.onmessage = handleEngineMessage;
                engineWorker.postMessage('uci');
                
                document.getElementById('engine-status').innerText = "AI Protocol Active";
                setEngineLevel();
            } catch (e) {
                console.error("AI Initialization Failure:", e);
                document.getElementById('engine-status').innerText = "Network Error - AI Offline";
                document.getElementById('engine-status').classList.replace('text-emerald-400', 'text-red-500');
            }
        }

        function triggerEngine() {
            if (game.game_over() || !engineWorker) return;
            
            document.getElementById('engine-status').innerText = "Calculating Vector...";
            document.getElementById('engine-spinner').classList.remove('hidden');

            const fen = game.fen();
            engineWorker.postMessage(`position fen ${fen}`);
            engineWorker.postMessage(`go depth ${LEVELS[currentLevel].depth}`);
        }

        function handleEngineMessage(event) {
            const line = event.data;
            if (line.includes('bestmove')) {
                const match = line.match(/bestmove\s+(\S+)/);
                if (match) {
                    const moveSan = match[1];
                    const moveObj = {
                        from: moveSan.substring(0, 2),
                        to: moveSan.substring(2, 4),
                        promotion: moveSan.length > 4 ? moveSan[4] : undefined
                    };
                    
                    const move = game.move(moveObj);
                    if (move) processExecutedMove(move);
                    
                    updateHighlights();
                    
                    document.getElementById('engine-status').innerText = "AI Protocol Active";
                    document.getElementById('engine-spinner').classList.add('hidden');
                }
            }
        }

        // --- 5. Interface Settings & Modals ---
        function buildLevelUI() {
            const container = document.getElementById('level-selector');
            container.innerHTML = '';
            Object.keys(LEVELS).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `level-btn py-1.5 rounded-[6px] text-xs font-bold transition-all ${currentLevel == key ? 'bg-emerald-500 text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-300'}`;
                btn.innerText = key;
                btn.onclick = () => {
                    currentLevel = key;
                    buildLevelUI();
                    setEngineLevel();
                };
                container.appendChild(btn);
            });
        }

        function setEngineLevel() {
            if (engineWorker) engineWorker.postMessage(`setoption name Skill Level value ${LEVELS[currentLevel].skill}`);
        }

        function setPlayerColor(color) {
            playerColor = color;
            
            document.getElementById('btn-play-white').className = color === 'w' 
                ? "flex-1 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 rounded-lg py-2 text-sm font-semibold transition-all shadow-md shadow-emerald-500/10"
                : "flex-1 bg-black/40 hover:bg-white/5 text-slate-400 border border-white/5 rounded-lg py-2 text-sm font-semibold transition-all";
                
            document.getElementById('btn-play-black').className = color === 'b'
                ? "flex-1 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 rounded-lg py-2 text-sm font-semibold transition-all shadow-md shadow-emerald-500/10"
                : "flex-1 bg-black/40 hover:bg-white/5 text-slate-400 border border-white/5 rounded-lg py-2 text-sm font-semibold transition-all";

            // Utilize 3D Rotation matrices to instantly flip the board structurally
            document.getElementById('board-container').style.transform = color === 'b' ? 'rotate(180deg)' : 'rotate(0deg)';
            document.querySelectorAll('.coord-label').forEach(el => el.style.transform = color === 'b' ? 'rotate(180deg)' : 'rotate(0deg)');
            
            renderPieces(); // Trigger piece counter-rotation
        }

        function startNewGame() {
            game.reset();
            initPieces();
            lastMove = null;
            selectedSquare = null;
            updateHighlights();
            checkStatus();
            
            if (playerColor === 'b') setTimeout(triggerEngine, 600);
        }

        function checkStatus() {
            let status = '';
            let moveColor = game.turn() === 'w' ? 'White' : 'Black';

            if (game.in_checkmate()) {
                status = `Terminated`;
                showModal('Checkmate!', `${moveColor} King compromised.`);
            } else if (game.in_draw() || game.in_stalemate()) {
                status = 'Draw';
                showModal('Stalemate!', 'Match concluded in a draw.');
            } else {
                status = `${moveColor} to move`;
                if (game.in_check()) status += ' (In Check)';
            }
            document.getElementById('game-status').innerText = status;
        }

        function showModal(title, desc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            const modal = document.getElementById('game-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
        }

        function closeModal() {
            const modal = document.getElementById('game-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('opacity-0', 'pointer-events-none');
            content.classList.add('scale-95');
            content.classList.remove('scale-100');
        }

        // --- Entry Hook ---
        window.onload = () => {
            lucide.createIcons();
            initBoardGrid();
            startNewGame();
            initStockfish();
            
            // Premium Interface Stagger Injection Animation
            gsap.from(".main-panel", { y: 30, opacity: 0, duration: 0.8, ease: "power3.out", stagger: 0.15 });
        };
    </script>
</body>
</html>
